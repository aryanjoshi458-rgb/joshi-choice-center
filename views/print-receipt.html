  <!-- VOICE + THEME CONTROLS -->

    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
      stroke-linejoin="round">
      <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
    </svg>
    <span>Speak</span>
  </div>

  <!-- AURA CELESTIAL v4 THEME SLIDER -->
  <div class="aura-celestial-v4" id="themeToggleV4">
    <div class="celestial-sky-window"></div>
    <div class="celestial-knob-v4" id="celestialKnob"></div>
  </div>

    <!-- AURA SMART CHAT PANEL -->
  <div id="auraChatPanel" class="aura-chat-panel">
    <div class="aura-chat-header">
      <div class="aura-chat-header-left">
        <div class="aura-chat-logo">AI</div>
        <div class="aura-chat-header-info">
          <h3>Aura Assistant</h3>
          <p>Your Smart Companion</p>
        </div>
      </div>
      <div class="aura-chat-controls">
        <div class="aura-chat-control min"></div>
        <div class="aura-chat-control max"></div>
        <div id="closeAuraChat" class="aura-chat-control close"></div>
      </div>
    </div>
    <div class="aura-chat-history" id="auraChatHistory">
      <!-- Messages appear here -->
    </div>
    <div class="aura-chat-input-area">
      <input type="text" id="auraChatInput" placeholder="Ask about the software...">
      <button class="aura-chat-send" id="auraChatSend">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13" />
          <polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
      </button>
    </div>
  </div>


  <!-- Main content -->
  <main class="main">

    <!-- CENTER HEADER -->
    <header class="brand">
      <div class="brand-box">
        <div class="logo">JC</div>
        <h1 class="app-title" data-i18n="app-title">Joshi Choice Center</h1>
      </div>
    </header>

    <div class="container">

      <div class="card">
        <h3 data-i18n="search-receipt">
          <svg class="title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          Search Receipt
        </h3>

        <input id="search" placeholder="Name / Mobile / TXN">

        <select id="format" onchange="updatePreview()">
          <option value="1" selected>Classic</option>
          <option value="2">Premium Design</option>
          <option value="3">Modern Receipt</option>
          <option value="4">Compact Bill</option>
          <option value="5">Detailed Service</option>
        </select>

        <select id="pageSize" onchange="updatePreview()">
          <option value="58">58mm</option>
          <option value="80" selected>80mm</option>
          <option value="a4-p">A4 Portrait</option>
          <option value="a4-l">A4 Landscape</option>
        </select>

        <div id="list"></div>
      </div>

      <div class="card">
        <h3 data-i18n="receipt-preview">
          <svg class="title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
          Receipt Preview
        </h3>

        <div id="preview" class="receipt"></div>

        <div class="actions-flex" style="display: flex; gap: 10px; margin-top: 15px;">
          <button class="print-btn" onclick="printReceipt()" data-i18n="print-receipt-btn" style="flex: 1;">🖨️ Print
            Receipt</button>
          <button class="whatsapp-btn" onclick="sendWhatsApp()" data-i18n="send-whatsapp-btn"
            style="flex: 1; background: #25d366; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s;">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path
                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" />
            </svg>
            Send WhatsApp
          </button>
        </div>
      </div>

    </div>

    <!-- HIDDEN IFRAME FOR SEAMLESS PRINTING -->
    <iframe id="printFrame" style="display:none;"></iframe>

    <!-- MODAL ROOT -->
    <div id="modalRoot"></div>
